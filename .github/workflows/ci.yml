name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  subtitle-tool:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Compile subtitle tool
        run: python -m compileall foreign_video_subtitle_tool
      - name: Run subtitle tool tests
        run: python -m pytest -q tests_subtitle_tool
