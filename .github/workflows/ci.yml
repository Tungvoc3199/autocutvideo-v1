name: subtitle-tool-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Compile package
        run: python -m compileall foreign_video_subtitle_tool
      - name: Run tests
        run: python -m pytest -q tests_subtitle_tool
